<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audio QA — Fenrir</title>
<style>
  :root{
    --washi:#f5f1e8; --washi2:#efebe2; --ink:#1a1816; --ink2:#3a352f; --ink3:#8a8276;
    --vermilion:#c2410c; --hair:rgba(26,24,22,.12); --hair2:rgba(26,24,22,.06);
    --good:#15803d; --flag:#c2410c;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Schibsted Grotesk","Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    background:var(--washi);color:var(--ink);}
  header{position:sticky;top:0;z-index:5;background:var(--ink);color:var(--washi);
    padding:14px 18px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;
    box-shadow:0 2px 12px rgba(0,0,0,.18);}
  header h1{font-size:1rem;margin:0;font-weight:700;letter-spacing:-.01em;flex-shrink:0}
  header .count{font-size:.78rem;color:#cfc8ba;font-variant-numeric:tabular-nums}
  .grow{flex:1}
  input[type=search]{flex:1;min-width:160px;padding:9px 12px;border-radius:9px;border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.08);color:var(--washi);font-size:.95rem;font-family:inherit}
  input[type=search]::placeholder{color:#a59d90}
  button{font-family:inherit;cursor:pointer}
  .btn{background:rgba(255,255,255,.12);color:var(--washi);border:1px solid rgba(255,255,255,.22);
    border-radius:8px;padding:8px 13px;font-size:.82rem;font-weight:600}
  .btn:hover{background:rgba(255,255,255,.22)}
  .btn.primary{background:var(--vermilion);border-color:var(--vermilion)}
  .cats{display:flex;flex-wrap:wrap;gap:6px;padding:10px 18px;background:var(--washi2);
    border-bottom:1px solid var(--hair);position:sticky;top:54px;z-index:4}
  .cat{background:#fff;border:1px solid var(--hair);border-radius:999px;padding:6px 12px;font-size:.78rem;font-weight:600;color:var(--ink2)}
  .cat.active{background:var(--ink);color:var(--washi);border-color:var(--ink)}
  .cat .n{opacity:.6;margin-left:5px;font-variant-numeric:tabular-nums}
  main{max-width:880px;margin:0 auto;padding:12px 14px 80px}
  .row{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--hair2);
    border-radius:12px;padding:10px 12px;margin-bottom:7px;box-shadow:0 1px 4px rgba(0,0,0,.03)}
  .row.flagged{border-color:var(--flag);background:#fff7f2;box-shadow:0 0 0 2px rgba(194,65,12,.14)}
  .row.playing{border-color:var(--ink)}
  .play{flex-shrink:0;width:42px;height:42px;border-radius:50%;border:none;background:var(--ink);color:var(--washi);
    font-size:1rem;display:flex;align-items:center;justify-content:center}
  .play:hover{background:var(--vermilion)}
  .row.playing .play{background:var(--vermilion)}
  .body{flex:1;min-width:0}
  .jp{font-size:1.15rem;font-weight:600;line-height:1.3;word-break:break-word}
  .spoken{font-size:.8rem;color:var(--ink3);margin-top:2px;word-break:break-word}
  .spoken b{color:var(--vermilion);font-weight:600}
  .tag{display:inline-block;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
    color:var(--ink3);background:var(--washi2);border-radius:5px;padding:2px 6px;margin-top:4px}
  .flagbtn{flex-shrink:0;width:38px;height:38px;border-radius:9px;border:1px solid var(--hair);
    background:var(--washi2);font-size:1.05rem;line-height:1}
  .row.flagged .flagbtn{background:var(--flag);border-color:var(--flag)}
  .note{display:none;width:100%;margin-top:8px;padding:7px 10px;border-radius:8px;border:1px solid var(--hair);
    font-size:.9rem;font-family:inherit;background:var(--washi2)}
  .row.flagged .note{display:block}
  .more{display:block;margin:14px auto;}
  dialog{border:none;border-radius:14px;max-width:560px;width:92%;padding:0;box-shadow:0 24px 60px rgba(0,0,0,.3)}
  dialog::backdrop{background:rgba(26,24,22,.5)}
  .dlg-h{background:var(--ink);color:var(--washi);padding:14px 18px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .dlg-b{padding:16px 18px}
  textarea{width:100%;height:240px;border:1px solid var(--hair);border-radius:10px;padding:10px;font-family:"SF Mono",ui-monospace,monospace;font-size:.82rem;background:var(--washi2)}
  .muted{color:var(--ink3);font-size:.85rem}
</style>
</head>
<body>
<header>
  <h1>🎧 Audio QA</h1>
  <span class="count" id="count">loading…</span>
  <span class="grow"></span>
  <input type="search" id="search" placeholder="search Japanese / reading…">
  <button class="btn" id="exportBtn">🚩 Export flags (<span id="flagN">0</span>)</button>
</header>
<div class="cats" id="cats"></div>
<main id="list"></main>

<dialog id="dlg">
  <div class="dlg-h"><span>Flagged items</span><button class="btn" onclick="document.getElementById('dlg').close()">✕</button></div>
  <div class="dlg-b">
    <p class="muted">Copy this and paste it back in chat. Each line: original → what it should sound like.</p>
    <textarea id="exportText" readonly></textarea>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="btn primary" id="copyBtn">Copy to clipboard</button>
      <button class="btn" id="clearBtn">Clear all flags</button>
    </div>
  </div>
</dialog>

<script>
const FLAGS_KEY='jp-audio-qa-flags';
let items=[], flags={}, cat='Reading', limit=300, audio=new Audio(), playingKey=null;

try{ flags=JSON.parse(localStorage.getItem(FLAGS_KEY)||'{}'); }catch(e){ flags={}; }

function categoryOf(sources){
  const s=sources.join(' ');
  if(/:(kun|on|reading)\b/.test(s)) return 'Reading';
  if(/:surface\b/.test(s)) return 'Word';
  if(/particles:/.test(s)) return 'Particle';
  if(/\/grammar:|:(parts|given|answer|sentence)\b/.test(s)) return 'Grammar';
  if(/\/lessons:/.test(s)) return 'Lesson';
  if(/\/audiostories:/.test(s)) return 'Audio Dojo';
  if(/\/reviews:/.test(s)) return 'Review';
  if(/\/stories:/.test(s)) return 'Story';
  if(/settings:/.test(s)) return 'Settings';
  return 'Other';
}
const CATS=['Reading','Word','Particle','Lesson','Story','Grammar','Audio Dojo','Review','Settings','Other'];

function clipUrl(it){ return 'data/audio/clips/'+it.hash+'.m4a'; }

function play(it, rowEl){
  if(playingKey===it.key && !audio.paused){ audio.pause(); return; }
  document.querySelectorAll('.row.playing').forEach(r=>r.classList.remove('playing'));
  rowEl.classList.add('playing');
  playingKey=it.key;
  audio.src=clipUrl(it); audio.currentTime=0; audio.play().catch(()=>{});
}
audio.onended=()=>{document.querySelectorAll('.row.playing').forEach(r=>r.classList.remove('playing'));};
audio.onpause=()=>{document.querySelectorAll('.row.playing').forEach(r=>r.classList.remove('playing'));};

function flagCount(){ return Object.keys(flags).length; }
function saveFlags(){ localStorage.setItem(FLAGS_KEY, JSON.stringify(flags)); document.getElementById('flagN').textContent=flagCount(); }

function matches(it, q){
  if(!q) return true;
  return (it.text&&it.text.includes(q)) || it.key.includes(q);
}

function render(){
  const q=document.getElementById('search').value.trim();
  const filtered=items.filter(it=>(cat==='All'||it._cat===cat)&&matches(it,q));
  const list=document.getElementById('list');
  list.innerHTML='';
  const shown=filtered.slice(0,limit);
  for(const it of shown){
    const row=document.createElement('div');
    row.className='row'+(flags[it.key]?' flagged':'');
    const diff = it.text!==it.key;
    row.innerHTML=
      '<button class="play" title="play">▶</button>'+
      '<div class="body">'+
        '<div class="jp"></div>'+
        (diff?'<div class="spoken">spoken: <b></b></div>':'')+
        '<span class="tag">'+it._cat+'</span>'+
        '<input class="note" placeholder="what should it sound like? (e.g. はは = ha-ha)">'+
      '</div>'+
      '<button class="flagbtn" title="flag">🚩</button>';
    row.querySelector('.jp').textContent=it.text||it.key;
    if(diff) row.querySelector('.spoken b').textContent=it.key;
    const note=row.querySelector('.note');
    if(flags[it.key]) note.value=flags[it.key].note||'';
    row.querySelector('.play').onclick=()=>play(it,row);
    row.querySelector('.flagbtn').onclick=()=>{
      if(flags[it.key]){ delete flags[it.key]; row.classList.remove('flagged'); }
      else { flags[it.key]={note:note.value||'',text:it.text,cat:it._cat}; row.classList.add('flagged'); note.focus(); }
      saveFlags();
    };
    note.oninput=()=>{ if(flags[it.key]){ flags[it.key].note=note.value; saveFlags(); } };
    list.appendChild(row);
  }
  document.getElementById('count').textContent=filtered.length+' items'+(filtered.length>limit?' (showing '+limit+')':'');
  if(filtered.length>limit){
    const b=document.createElement('button'); b.className='btn more'; b.textContent='Show more';
    b.onclick=()=>{limit+=300;render();}; list.appendChild(b);
  }
}

function renderCats(){
  const counts={}; for(const c of CATS) counts[c]=0;
  for(const it of items) counts[it._cat]=(counts[it._cat]||0)+1;
  const wrap=document.getElementById('cats');
  wrap.innerHTML='';
  for(const c of ['All',...CATS]){
    const n = c==='All'? items.length : (counts[c]||0);
    if(c!=='All'&&!n) continue;
    const b=document.createElement('button');
    b.className='cat'+(c===cat?' active':'');
    b.innerHTML=c+'<span class="n">'+n+'</span>';
    b.onclick=()=>{cat=c;limit=300;renderCats();render();};
    wrap.appendChild(b);
  }
}

function buildExport(){
  const lines=['AUDIO QA FLAGS ('+flagCount()+'):',''];
  for(const [key,f] of Object.entries(flags)){
    lines.push('- ['+(f.cat||'?')+'] "'+(f.text||key)+'"'+(f.text!==key?' (spoken: "'+key+'")':'')+' → '+(f.note||'(no note)'));
  }
  return lines.join('\n');
}

document.getElementById('search').oninput=()=>{limit=300;render();};
document.getElementById('exportBtn').onclick=()=>{
  document.getElementById('exportText').value=buildExport();
  document.getElementById('dlg').showModal();
};
document.getElementById('copyBtn').onclick=()=>{
  const t=document.getElementById('exportText'); t.select();
  navigator.clipboard.writeText(t.value).then(()=>{document.getElementById('copyBtn').textContent='Copied!';setTimeout(()=>document.getElementById('copyBtn').textContent='Copy to clipboard',1200);});
};
document.getElementById('clearBtn').onclick=()=>{ if(confirm('Clear all '+flagCount()+' flags?')){ flags={}; saveFlags(); document.getElementById('dlg').close(); render(); } };

fetch('data/audio/keys.audio.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  items=d.items.map(it=>({...it,_cat:categoryOf(it.sources)}));
  document.getElementById('flagN').textContent=flagCount();
  renderCats(); render();
}).catch(e=>{ document.getElementById('count').textContent='failed to load keys.audio.json — serve from repo root'; });
</script>
</body>
</html>
