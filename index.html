<!-- ============================================================
  Rikizo Japanese — standalone phone web app.
  Single self-hosted entry point (no Webflow embed). All code,
  data, and assets are served from this app's own origin via
  relative URLs (config.assetMode === 'local').

  Load order (mirrors the legacy embed):
    Eager (before menu renders): asset-loader, streak
    Deferred (on first launch):  tts, stamp-settings, tts-settings,
                                 progress, unlock, text-processor, term-modal
                                 then the requested feature module.
  ============================================================ -->

<!-- Self-hosted Latin display fonts (offline). Japanese text falls back to the
     system font (Hiragino on iOS/macOS). Regenerate with scripts/vendor-fonts.mjs. -->
<link href="app/shared/fonts.css" rel="stylesheet">
<script>
  // Cache-bust jp-text.css — Capacitor/WKWebView is aggressive about caching
  // stylesheets, which masked CSS updates during development.
  (function(){
    var l = document.createElement('link');
    l.rel = 'stylesheet';
    l.href = 'app/shared/jp-text.css?t=' + Date.now();
    document.head.appendChild(l);
  })();
</script>

<style>
:root {
  --washi:      oklch(0.97 0.008 80);
  --washi-2:    oklch(0.94 0.012 75);
  --washi-3:    oklch(0.90 0.015 75);
  --ink:        oklch(0.22 0.012 60);
  --ink-2:      oklch(0.38 0.012 60);
  --ink-3:      oklch(0.55 0.012 60);
  --hairline:   oklch(0.22 0.012 60 / 0.12);
  --hairline-2: oklch(0.22 0.012 60 / 0.06);
  --vermilion:  oklch(0.60 0.18 30);
  --vermilion-ink: oklch(0.52 0.18 30);
  --moss:       oklch(0.58 0.09 140);
  --indigo:     oklch(0.42 0.08 250);
  --gold:       oklch(0.78 0.10 85);

  --font-ui:         "Schibsted Grotesk", "Work Sans", system-ui, sans-serif;
  --font-jp:         "Noto Sans JP", system-ui, sans-serif;
  --font-jp-display: "Noto Serif JP", "Shippori Mincho", serif;
  --font-mono:       "JetBrains Mono", ui-monospace, Menlo, monospace;

  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 22px;
  --r-xl: 28px;

  --tabbar-h: 64px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: var(--font-ui);
  background: oklch(0.88 0.012 70);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font-family: inherit; }

/* App shell — a centered phone column that fills the screen on mobile. */
#app-main-container {
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  background:
    radial-gradient(1200px 800px at 20% 10%, oklch(0.99 0.01 80 / 0.6), transparent 50%),
    radial-gradient(900px 600px at 90% 90%, oklch(0.94 0.015 40 / 0.35), transparent 55%),
    var(--washi);
  overflow-x: hidden;
  box-shadow: 0 0 60px rgba(0,0,0,0.10);
}

/* Paper grain overlay */
.rk-home::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent 0 2px, oklch(0.2 0.01 60 / 0.012) 2px 3px),
    repeating-linear-gradient(90deg, transparent 0 2px, oklch(0.2 0.01 60 / 0.012) 2px 3px);
  mix-blend-mode: multiply;
  opacity: 0.6;
}
.rk-home { position: relative; }
.rk-home > * { position: relative; z-index: 1; }

.jp-serif { font-family: var(--font-jp-display); }
.jp-sans  { font-family: var(--font-jp); }
.mono     { font-family: var(--font-mono); letter-spacing: 0; }
.pixel    { image-rendering: pixelated; image-rendering: crisp-edges; }

ruby { ruby-position: over; }
rt {
  font-size: 0.5em;
  font-weight: 500;
  color: var(--ink-2);
  letter-spacing: 0;
}

/* Hanko (red seal) */
.hanko {
  font-family: var(--font-jp-display);
  font-weight: 700;
  color: #fff;
  background: var(--vermilion);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  line-height: 1;
  box-shadow: 0 2px 0 oklch(0.45 0.18 30 / 0.4);
  position: relative;
  flex-shrink: 0;
}
.hanko::before {
  content: "";
  position: absolute;
  inset: 2px;
  border: 1px solid oklch(1 0 0 / 0.35);
  border-radius: 4px;
  pointer-events: none;
}

.noscroll::-webkit-scrollbar { display: none; }
.noscroll { scrollbar-width: none; }

.rk-press { transition: transform 0.12s ease; cursor: pointer; }
.rk-press:active { transform: scale(0.985); }

/* Bottom tab bar — fixed, blurred washi */
.rk-tabbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  z-index: 50;
  padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
  background: oklch(0.97 0.008 80 / 0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--hairline);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
}
/* Persistent nav: the bar lives in #rk-tabbar-root (a sibling of the app
   container) so a module's container.innerHTML can't wipe it. It auto-hides on
   focused task screens via body.jp-tabbar-hidden; on nav-visible screens the
   scroll area reserves the bar's strip so content isn't covered. */
body.jp-tabbar-hidden #rk-tabbar-root { display: none; }
body:not(.jp-tabbar-hidden) #app-main-container { padding-bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom)); }
/* Inner-scroller menus (root pinned to 100dvh, content scrolls inside) reserve
   the strip on that scroller instead. */
body:not(.jp-tabbar-hidden) .lh-body,
body:not(.jp-tabbar-hidden) .gr-body { padding-bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom)); }
.rk-tab {
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px 2px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  color: var(--ink-3);
}
.rk-tab.active { color: var(--ink); }
.rk-tab .rk-tab-ind {
  width: 14px; height: 2px; border-radius: 999px;
  background: var(--vermilion); margin-top: -1px;
}

@keyframes glossFadeIn { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: translateY(0); } }
@keyframes hanabiPop { 0% { opacity: 0; transform: scale(0.5);} 20% { opacity:1; transform:scale(1.2);} 50%{opacity:1;transform:scale(1);} 80%{opacity:1;transform:scale(1);} 100%{opacity:0;transform:scale(1.1);} }
@keyframes jpFadeIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }
@keyframes jpBounce { 0%{transform:scale(0);} 60%{transform:scale(1.15);} 100%{transform:scale(1);} }
@keyframes jpScaleIn { 0%{transform:scale(0) rotate(-10deg);opacity:0;} 60%{transform:scale(1.1) rotate(3deg);opacity:1;} 100%{transform:scale(1) rotate(0);opacity:1;} }

/* Return / rank-up overlays */
.jp-return-overlay {
  position: fixed; inset: 0;
  background: oklch(0.22 0.012 60 / 0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; animation: jpFadeIn 0.3s;
  padding: 24px;
}
.jp-return-card {
  background: var(--washi); border-radius: var(--r-xl); padding: 30px;
  max-width: 340px; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: jpFadeIn 0.4s;
}
.jp-return-jp { font-family: var(--font-jp-display); font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; color: var(--ink); }
.jp-return-text { font-size: 1rem; color: var(--ink-2); margin-bottom: 16px; }
.jp-return-belt { width: 100px; height: auto; margin: 8px auto 12px; display: block; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15)); }
.jp-rankup-card {
  background: var(--ink); border-radius: var(--r-xl); padding: 30px;
  max-width: 360px; text-align: center; position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4); animation: jpFadeIn 0.4s; overflow: hidden;
}
.jp-rankup-rikizo { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 12px; border: 3px solid oklch(1 0 0 / 0.3); animation: jpBounce 0.6s ease 0.3s both; }
.jp-rankup-title { font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--vermilion); margin-bottom: 4px; }
.jp-rankup-stage { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; color: var(--washi); }
.jp-rankup-stage-jp { font-family: var(--font-jp-display); font-size: 1.1rem; color: oklch(1 0 0 / 0.7); margin-bottom: 16px; }
.jp-rankup-belt { width: 140px; height: auto; margin: 0 auto 16px; display: block; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)); animation: jpScaleIn 0.5s ease 0.2s both; }
.jp-rankup-streak { font-family: var(--font-mono); font-size: 0.8rem; color: oklch(1 0 0 / 0.5); margin-bottom: 16px; }
.jp-rankup-particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.jp-rankup-particle { position: absolute; border-radius: 50%; opacity: 0; }

.rk-loading {
  display: flex; align-items: center; justify-content: center;
  min-height: 60vh; flex-direction: column; gap: 14px;
  color: var(--ink-3); font-family: var(--font-mono); font-size: 12px;
  letter-spacing: 0.1em; text-transform: uppercase;
}
/* Breathing 力 mark so a load reads as "working", not "frozen". The text node
   stays inline (callers pass "力 · loading X"); we animate the whole block subtly
   and add a dot row beneath via ::after. */
.rk-loading {
  animation: rkLoadFade 0.4s ease-out both;
}
.rk-loading::before {
  content: '力';
  font-family: var(--font-jp-display, serif);
  font-size: 40px; line-height: 1; color: var(--vermilion);
  animation: rkLoadPulse 1.3s ease-in-out infinite;
  text-transform: none;
}
.rk-loading::after {
  content: '· · ·';
  letter-spacing: 0.3em;
  animation: rkLoadDots 1.3s steps(4, end) infinite;
}
@keyframes rkLoadPulse {
  0%, 100% { opacity: 0.35; transform: scale(0.94); }
  50%      { opacity: 1;    transform: scale(1.04); }
}
@keyframes rkLoadDots { 0% { opacity: 0.2; } 50% { opacity: 0.9; } 100% { opacity: 0.2; } }
@keyframes rkLoadFade { from { opacity: 0; } to { opacity: 1; } }
@media (prefers-reduced-motion: reduce) {
  .rk-loading::before, .rk-loading::after, .rk-loading { animation: none; }
}
</style>

<!-- ============================================================
  QA reset helper. Visit ?reset=<scope> to wipe specific state and
  reload to a clean URL. Never fires unless the query is present.
    ?reset=all          — every k-* key (full fresh-install state)
    ?reset=onboarding   — re-run first-launch onboarding
    ?reset=tutorial     — re-run the N5.1 + G1 + Dojo + Compose in-content tutorials
    ?reset=progress     — roll lesson scores/completion back to zero
    ?reset=grammar      — strip all G* progress + grammar tutorial seen
                           (Today card returns to G1; N5.1 progress preserved)
    ?reset=n52          — mark everything through N5.2 as passed
                           (N5.1 + G1 + G2 + G3 + N5.2 all completed @ 60%).
                           Unlocks Stories, Review, Compose, Game day 1, Dojo,
                           Scramble — full module surface for QA.
    ?reset=reading-aids — turn off Furigana + Romaji toggles
    ?reset=all-content  — mark every N5+N4 lesson, grammar, and review
                           complete at 60%. Unlocks every story (curriculum +
                           custom). Use for full QA across all modules.
    ?demo=ruby          — open a persistent Reading Aids preview panel on
                           the home screen for live toggle testing
============================================================ -->
<script>
(function () {
  var scope = new URLSearchParams(location.search).get('reset');
  if (!scope) return;
  var remove = function (keys) {
    keys.forEach(function (k) { try { localStorage.removeItem(k); } catch (e) {} });
  };
  if (scope === '1' || scope === 'all') {
    var toRemove = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf('k-') === 0) toRemove.push(k);
    }
    remove(toRemove);
  } else if (scope === 'onboarding') {
    remove(['k-rikizo-onboarded']);
  } else if (scope === 'tutorial') {
    remove(['k-rikizo-lesson-tutorial-seen', 'k-rikizo-lesson-tutorial-done',
            'k-rikizo-grammar-tutorial-seen', 'k-rikizo-dojo-tutorial-seen',
            'k-rikizo-compose-tutorial-seen', 'k-rikizo-settings-tutorial-seen']);
  } else if (scope === 'progress') {
    remove(['k-lesson-completed', 'k-lesson-scores', 'k-lesson-resume']);
  } else if (scope === 'grammar') {
    // Strip every G* key from completed + scores, AND guarantee N5.1 is
    // marked passed (≥60%) so Grammar module + G1 are unlocked. Net effect:
    // Today card lands on G1 no matter what state the user was in before
    // (including never having completed N5.1). Also wipes the grammar
    // tutorial seen-set.
    var completedMap = {}, scoresMap = {};
    try { completedMap = JSON.parse(localStorage.getItem('k-lesson-completed') || '{}'); } catch (e) {}
    try { scoresMap    = JSON.parse(localStorage.getItem('k-lesson-scores')    || '{}'); } catch (e) {}
    Object.keys(completedMap).forEach(function (k) { if (/^G\d+$/.test(k)) delete completedMap[k]; });
    Object.keys(scoresMap).forEach(function (k) { if (/^G\d+$/.test(k)) delete scoresMap[k]; });
    completedMap['N5.1'] = true;
    if ((scoresMap['N5.1'] || 0) < 60) scoresMap['N5.1'] = 60;
    try {
      localStorage.setItem('k-lesson-completed', JSON.stringify(completedMap));
      localStorage.setItem('k-lesson-scores',    JSON.stringify(scoresMap));
      // Mark onboarded so QA lands as a returning user (time-of-day greeting)
      // instead of re-running the home onboarding tour.
      localStorage.setItem('k-rikizo-onboarded', '1');
    } catch (e) {}
    remove(['k-rikizo-grammar-tutorial-seen']);
  } else if (scope === 'n52') {
    // QA shortcut: jump to the state where every module type is unlocked —
    // Stories + Review need G4 completed; Compose/Game/Dojo need N5.1 passed;
    // Grammar lessons up to G4 need any-completion of their prereq. Walks the
    // chain N5.1 → G1 → G2 → G3 → N5.2 → G4 and marks each completed at 60%.
    // Also marks onboarded so QA lands on Home directly, and wipes
    // tutorial-seen so first-time tutorials replay for QA.
    var doneMap = {}, scoreMap = {};
    try { doneMap  = JSON.parse(localStorage.getItem('k-lesson-completed') || '{}'); } catch (e) {}
    try { scoreMap = JSON.parse(localStorage.getItem('k-lesson-scores')    || '{}'); } catch (e) {}
    ['N5.1', 'G1', 'G2', 'G3', 'N5.2', 'G4'].forEach(function (id) {
      doneMap[id] = true;
      if ((scoreMap[id] || 0) < 60) scoreMap[id] = 60;
    });
    try {
      localStorage.setItem('k-lesson-completed', JSON.stringify(doneMap));
      localStorage.setItem('k-lesson-scores',    JSON.stringify(scoreMap));
      localStorage.setItem('k-rikizo-onboarded', '1');
    } catch (e) {}
    remove(['k-rikizo-lesson-tutorial-seen', 'k-rikizo-lesson-tutorial-done',
            'k-rikizo-grammar-tutorial-seen', 'k-rikizo-dojo-tutorial-seen',
            'k-rikizo-compose-tutorial-seen']);
  } else if (scope === 'reading-aids') {
    remove(['k-furigana-on', 'k-romaji-on']);
  } else if (scope === 'all-content') {
    // QA shortcut: mark every lesson, grammar lesson, and review across N5
    // + N4 as completed at 60%. Unlocks ALL stories (curriculum + custom)
    // plus every other gated module. Idempotent — re-running this never
    // lowers existing scores.
    var doneMap2 = {}, scoreMap2 = {};
    try { doneMap2  = JSON.parse(localStorage.getItem('k-lesson-completed') || '{}'); } catch (e) {}
    try { scoreMap2 = JSON.parse(localStorage.getItem('k-lesson-scores')    || '{}'); } catch (e) {}
    var fetchManifestSync = function () {
      var x = new XMLHttpRequest();
      x.open('GET', 'manifest.json?t=' + Date.now(), false);
      try { x.send(null); return JSON.parse(x.responseText); } catch (e) { return null; }
    };
    var manifest = fetchManifestSync();
    if (manifest && manifest.data) {
      Object.keys(manifest.data).forEach(function (lvl) {
        ['lessons', 'reviews', 'grammar'].forEach(function (kind) {
          (manifest.data[lvl][kind] || []).forEach(function (item) {
            if (!item.id) return;
            doneMap2[item.id] = true;
            if ((scoreMap2[item.id] || 0) < 60) scoreMap2[item.id] = 60;
          });
        });
      });
      try {
        localStorage.setItem('k-lesson-completed', JSON.stringify(doneMap2));
        localStorage.setItem('k-lesson-scores',    JSON.stringify(scoreMap2));
        localStorage.setItem('k-rikizo-onboarded', '1');
      } catch (e) {}
    }
  }
  // Strip the query so a refresh doesn't repeat the wipe.
  location.replace(location.pathname);
})();
</script>

<script>
window.JPApp = {
  // --- CONFIGURATION ---
  // assetMode 'local' → every file (code, data, assets) is fetched relative to
  // this app's own origin instead of the GitHub raw CDN.
  config: {
    owner: "gryswynd",
    repo: "jp-kanjimaster",
    branch: "main",
    assetMode: "local",
    codeBase: "",
    // ── Version (OTA spine) ───────────────────────────────────────────────
    // buildNumber is the single source of truth for "what build is this".
    //   • Bump it by 1 every time you ship a web-code/data fix testers should
    //     receive via Settings → Check for updates.
    //   • scripts/build-www.mjs READS these fields and writes www/version.json,
    //     so the bundled build and the hosted version.json can never drift.
    //   • The OTA updater compares this bundled buildNumber to the hosted one.
    // appVersion is the human-facing label (keep ~in sync with Xcode MARKETING_VERSION).
    appVersion: "0.1.0",
    buildNumber: 1,
    // Where the OTA updater looks for newer builds. Empty = OTA disabled (app just
    // runs its bundled copy, fully offline). Set to the Firebase Hosting URL once
    // hosting is live, e.g. "https://rikizo-app.web.app".
    updateBaseUrl: "",
    // Progress-sync server (Cloud Run). Used by app/shared/sync.js only — the AI
    // tutor stays off until tutorBaseUrl is set separately.
    apiBaseUrl: "https://rikizo-tutor-979574126888.us-west1.run.app",
    // AI tutor (Rikizo Press-to-Ask) — same Cloud Run service as apiBaseUrl.
    // Overridable at runtime via ?tutor= or localStorage k-tutor-base-url.
    tutorBaseUrl: "https://rikizo-tutor-979574126888.us-west1.run.app"
  },

  _manifest: null,

  // --- INLINE GATE CHECK (works before unlock.js loads) ---
  _isModuleVisible: function(module) {
    var cfg = window.RIKIZO_CONFIG;
    if (cfg && cfg.mode === 'free') return true;
    if (window.JPShared && window.JPShared.unlock) {
      return window.JPShared.unlock.isModuleVisible(module);
    }
    var scores    = JSON.parse(localStorage.getItem('k-lesson-scores')    || '{}');
    var completed = JSON.parse(localStorage.getItem('k-lesson-completed') || '{}');
    var pass = function(id) { return (scores[id] || 0) >= 60; };
    var done = function(id) { return !!completed[id]; };
    switch (module) {
      case 'lesson':   return true;
      case 'grammar':  return done('N5.1');
      case 'practice': return done('N5.1');
      case 'compose':  return pass('N5.1');
      case 'game':     return pass('N5.1');
      case 'story':    return done('G4');
      case 'review':   return done('G4');
      case 'audiodojo': return pass('N5.3');
      case 'map':      return true;
      case 'custom':   return true;
      // Writing modules live under the Dojo's Writing hub; entry is already
      // gated by 'practice'. Once a user is inside the hub, writing is free.
      case 'writing-kanji': return true;
      case 'writing-kana':  return true;
      default:         return false;
    }
  },

  // --- HELPER: Fetch and inject a JS module (relative to app origin) ---
  loadModule: async function(fileName) {
    var base = this.config.codeBase || '';
    var url = base + fileName + '?t=' + Date.now();
    try {
      var res = await fetch(url);
      if (!res.ok) throw new Error('Failed to load ' + fileName);
      var code = await res.text();
      var script = document.createElement('script');
      script.textContent = code;
      document.body.appendChild(script);
      console.log('[JPApp] Loaded:', fileName);
      return true;
    } catch (err) {
      console.error('[JPApp] Error loading ' + fileName + ':', err);
      this.container.innerHTML =
        '<div style="color:var(--vermilion);text-align:center;padding:24px;font-family:var(--font-ui);">' +
        'Error loading ' + fileName + ':<br>' + err.message + '</div>' +
        '<button onclick="JPApp.renderMenu()" style="margin:20px auto;display:block;padding:10px 22px;border:1px solid var(--hairline);border-radius:999px;background:var(--ink);color:var(--washi);cursor:pointer;">Back</button>';

  init: async function() {
    this.container = document.getElementById('app-main-container');
    if (!this.container) return console.error('Container #app-main-container not found');
    this.container.innerHTML = '<div class="rk-loading">loading</div>';
    // Diagnostics first — installs global JS-error capture so any error during the
    // rest of boot is caught and available to the bug-report tool.
    await this.loadModule('app/shared/diagnostics.js');
    await this.loadModule('app/shared/asset-loader.js');
    await this.loadModule('app/shared/user-profile.js');
    await this.loadModule('app/shared/streak.js');
    await this.loadModule('app/shared/haptics.js');
    await this.loadModule('app/shared/sfx.js');
    await this.loadModule('app/shared/scene-kit.js');
    await this.loadModule('app/shared/garden-stage.js'); // living koi ponds (Grammar Garden)
    await this.loadModule('vendor/page-flip.browser.js'); // StPageFlip (Stories reader)
    await this.loadModule('app/shared/practice-helpers.js');
    // Load Reading Aids renderer EARLY so the html.k-furigana / .k-romaji
    // classes are set before first paint (no flash of bare-then-furigana).
    await this.loadModule('app/shared/jp-text.js');
    if (window.JPShared && window.JPShared.jpText) {
      window.JPShared.jpText.applyReadingAids();
      // QA demo: ?demo=ruby renders a persistent reading-aids preview card on
      // top of the home screen so the toggles can be exercised on real content
      // before any data migration has shipped.
      if (new URLSearchParams(location.search).get('demo') === 'ruby') {
        this._renderRubyDemo();
      }
    }
    await this.loadModule('app/shared/rikizo-companion.js');
    if (window.JPShared && window.JPShared.rikizoCompanion) {
      window.JPShared.rikizoCompanion.init(this.config);
    }
    // Ambient "Ask Rikizo" tutor overlay — always-on when the beta is enabled,
    // so its transport + quota + context deps load eagerly at boot.
    await this.loadModule('app/shared/device-id.js');
    // Accounts + cloud progress sync. Inert unless RIKIZO_FIREBASE is configured
    // AND a server URL is set, so this is a no-op in the current local-only build.
    await this.loadModule('app/shared/auth.js');
    await this.loadModule('app/shared/sync.js');
    await this.loadModule('app/shared/tutor-quota.js');
    await this.loadModule('app/shared/tutor-client.js');
    await this.loadModule('app/shared/tutor-context.js');
    await this.loadModule('app/shared/tutor-curriculum.js');
    await this.loadModule('app/shared/audio-capture.js');
    await this.loadModule('app/shared/tutor-overlay.js');
    await this.loadModule('app/shared/bug-report.js');
    if (window.JPShared && window.JPShared.tutorCurriculum) {
      // Preload manifest + glossary for curriculum awareness (non-blocking).
      window.JPShared.tutorCurriculum.init(this.config);
    }
    if (window.JPShared && window.JPShared.tutorOverlay) {
      window.JPShared.tutorOverlay.init(this.config);
    }
    try {
      this._manifest = await window.getManifest(this.config);
    } catch (e) {
      console.warn('[JPApp] manifest unavailable at boot:', e);
      this._manifest = null;
    }
    this.renderMenu();
    this._nativeBoot();

    var self = this;

    // Accounts + progress sync (all no-ops unless Firebase + server are set).
    if (window.JPShared && window.JPShared.auth) {
      window.JPShared.sync && window.JPShared.sync.start();
      window.JPShared.auth.ensureSignedIn().then(function () {
        if (window.JPShared.sync) window.JPShared.sync.pull();
        if (self._view === 'home') self.renderMenu(); // reflect signed-in state
      });
    }
    // When a cloud pull merges in newer progress, refresh Home so it shows.
    window.addEventListener('jp-progress-synced', function () {
      if (self._view === 'home') self.renderMenu();
    });

    // When the user updates their profile in Settings (first name, etc.),
    // refresh the home masthead so the new greeting appears immediately. If
    // they're inside a lesson/module, the next return to Home will pick it up.
    document.addEventListener('jp-user-profile-changed', function () {
      if (self._view === 'home') self.renderMenu();
    });
  },

  // --- NATIVE (Capacitor) boot tweaks: no-op in a plain browser ---
  _nativeBoot: function() {
    var Cap = window.Capacitor;
    if (!Cap || !Cap.isNativePlatform || !Cap.isNativePlatform()) return;
    var P = Cap.Plugins || {};
    try { P.StatusBar && P.StatusBar.setStyle({ style: 'LIGHT' }); } catch (e) {}
    try { P.StatusBar && P.StatusBar.setBackgroundColor && P.StatusBar.setBackgroundColor({ color: '#272320' }); } catch (e) {}
    try { P.SplashScreen && P.SplashScreen.hide(); } catch (e) {}

    // Local study reminders: reschedule on startup + every resume so the escalating
    // copy stays in sync with how many days the user has been away. Only loads the
    // module for users who have actually turned reminders on.
    var self = this;
    function rescheduleReminders() {
      if (localStorage.getItem('k-notif-enabled') !== '1') return;
      var run = function() {
        if (window.JPShared.notifications) window.JPShared.notifications.reschedule();
      };
      if (window.JPShared.notifications) { run(); return; }
      self.loadModule('app/shared/notification-settings.js').then(run).catch(function(e){
        console.error('Could not load notifications engine:', e);
      });
    }
    rescheduleReminders();
    try {
      P.App && P.App.addListener && P.App.addListener('appStateChange', function(s) {
        if (s && s.isActive) rescheduleReminders();
      });
    } catch (e) {}
  },

  // Build last-14-days active flags (oldest → newest) from the streak history.
  _streakHistory14: function(state) {
    var set = {};
    (state.history || []).forEach(function(d) { set[d] = true; });
    var arr = [];
    for (var i = 13; i >= 0; i--) {
      var d = new Date();
      d.setDate(d.getDate() - i);
      arr.push(!!set[d.toLocaleDateString('en-CA')]);
    }
    return arr;
  },

  // Real N5 progress + the next item to do, from manifest + localStorage.
  // `today` is the user's CURRENT BLOCKER — the next thing in the chain. It
  // walks grammars, then reviews, then lessons (in that priority), so the
  // natural chain surfaces in order: N5.1 → G1 → G2 → G3 → N5.2 → G4 →
  // N5.Review.1 → N5.3 → …  Reviews are included so a freshly-unlocked review
  // lands in the "up next" spot instead of leaving the card blank.
  // When everything available is done but the next lesson is gated by an
  // `extraRequirePass` that's still failing (e.g. N5.1 not passed), the
  // returned `today` is a "retake" entry for that lesson.
  _computeProgress: function() {
    var m = this._manifest;
    if (!m || !m.data || !m.data.N5) return null;
    var lessons   = m.data.N5.lessons || [];
    var completed = JSON.parse(localStorage.getItem('k-lesson-completed') || '{}');
    var scores    = JSON.parse(localStorage.getItem('k-lesson-scores')    || '{}');
    var free      = !window.RIKIZO_CONFIG || window.RIKIZO_CONFIG.mode !== 'gated';

    function done(id) { return !!completed[id]; }
    function passed(id) { return (scores[id] || 0) >= 60; }

    // Lesson "unlocked" check — pass-based for lesson prereqs, any-completion
    // for grammar prereqs, plus the optional extraRequirePass rule.
    function lessonUnlocked(l) {
      if (free) return true;
      if (l.extraRequirePass && !passed(l.extraRequirePass)) return false;
      if (!l.unlocksAfter) return true;
      if (/^G\d+$/.test(l.unlocksAfter)) return done(l.unlocksAfter);
      return passed(l.unlocksAfter);
    }
    // Mirror unlock.js isGrammarUnlocked: grammar-on-grammar uses completion,
    // grammar gated on a lesson requires a *pass* (a failed lesson must not
    // unlock the grammar that builds on it).
    function grammarUnlocked(g) {
      if (free) return true;
      if (!g.unlocksAfter) return true;
      if (/^G\d+$/.test(g.unlocksAfter)) return done(g.unlocksAfter);
      return passed(g.unlocksAfter);
    }
    // Reviews are graded; they unlock when their prereq is satisfied (grammar
    // prereq → completion, lesson prereq → pass).
    function reviewUnlocked(r) {
      if (free) return true;
      if (!r.unlocksAfter) return true;
      if (/^G\d+$/.test(r.unlocksAfter)) return done(r.unlocksAfter);
      return passed(r.unlocksAfter);
    }

    var lessonsTotal = lessons.length, lessonsDone = 0, kanjiTotal = 0, kanjiDone = 0;
    lessons.forEach(function(l) {
      var n = (l.kanji || []).length;
      kanjiTotal += n;
      if (done(l.id)) { lessonsDone++; kanjiDone += n; }
    });

    // Walk grammars + lessons in order; first unlocked-not-done wins. Grammars
    // first so the natural chain (N5.1 → G1 → G2 → G3 → N5.2) appears.
    var today = null;
    var grammars = m.data.N5.grammar || [];
    var grammarTotal = grammars.length, grammarDone = 0, grammarNext = null;
    grammars.forEach(function(g) {
      if (passed(g.id)) grammarDone++;
      else if (!grammarNext && grammarUnlocked(g)) grammarNext = g;
    });
    for (var i = 0; i < grammars.length; i++) {
      var g = grammars[i];
      if (grammarUnlocked(g) && !done(g.id)) {
        today = { kind: 'grammar', entry: g };
        break;
      }
    }
    // Reviews sit in the chain between a grammar/lesson and the lesson they
    // gate (e.g. G4 → N5.Review.1 → N5.3). Surface an unlocked-but-not-passed
    // review here so it lands in the "up next" spot instead of leaving the
    // card blank. Uses !passed (not !done) so a failed review keeps surfacing
    // for a retake until the student clears the 60% gate.
    if (!today) {
      var reviews = m.data.N5.reviews || [];
      for (var r = 0; r < reviews.length; r++) {
        var rv = reviews[r];
        if (reviewUnlocked(rv) && !passed(rv.id)) {
          today = { kind: 'review', entry: rv };
          break;
        }
      }
    }
    // First unlocked lesson that still needs work. A never-started lesson is a
    // fresh "lesson"; an unlocked lesson that was completed but FAILED (<60%)
    // re-surfaces as a "retake" — the chain is pass-gated, so a failed lesson
    // silently blocks everything after it (e.g. fail N5.2 → G4/Review.1/N5.3
    // all stay locked). Passing lessons are skipped.
    if (!today) {
      for (var j = 0; j < lessons.length; j++) {
        var l = lessons[j];
        if (!lessonUnlocked(l)) continue;
        if (!done(l.id))   { today = { kind: 'lesson', entry: l }; break; }
        if (!passed(l.id)) { today = { kind: 'retake', entry: l }; break; }
      }
    }
    // Backstop: a later lesson blocked by extraRequirePass on a still-unpassed
    // lesson (the N5.2-needs-N5.1 case). The loop above normally catches this
    // first; kept as a defensive fallback that also carries the blocked-lesson
    // context for a more specific retake message.
    if (!today) {
      for (var k = 0; k < lessons.length; k++) {
        var lk = lessons[k];
        if (lk.extraRequirePass && !passed(lk.extraRequirePass)) {
          var src = lessons.find(function(x){ return x.id === lk.extraRequirePass; });
          if (src) { today = { kind: 'retake', entry: src, blocking: lk }; break; }
        }
      }
    }

    return {
      lessonsTotal: lessonsTotal, lessonsDone: lessonsDone,
      kanjiTotal: kanjiTotal, kanjiDone: kanjiDone,
      grammarTotal: grammarTotal, grammarDone: grammarDone, grammarNext: grammarNext,
      today: today
    };
  },

  _kanjiOfDay: function() {
    var m = this._manifest;
    if (!m || !m.data || !m.data.N5) return null;
    var all = [];
    (m.data.N5.lessons || []).forEach(function(l) {
      (l.kanji || []).forEach(function(k) { all.push(k); });
    });
    if (!all.length) return null;
    var now = new Date();
    var doy = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
    return all[doy % all.length];
  },

  _findDraft: function() {
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (!k || k.indexOf('compose-draft-') !== 0) continue;
      // Compose stores both the text and a `__promptIdx` companion under the
      // same prefix — skip the companion or the preview shows the index.
      if (k.indexOf('__promptIdx') !== -1) continue;
      var v = localStorage.getItem(k);
      if (!v || !v.trim()) continue;
      var id = k.slice('compose-draft-'.length);
      // Compose drafts with a best score ≥75 are "complete" — don't nag
      // the user from the home page to keep editing them.
      var best = parseInt(localStorage.getItem('compose-best-' + id), 10);
      if (!isNaN(best) && best >= 75) continue;
      return { id: id, text: v };
    }
    return null;
  },

        '<div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:600;color:var(--ink);">Begin your streak</div>' +
        '<div style="font-size:12px;color:var(--ink-3);margin-top:2px;">Complete an activity today to start training.</div></div>' +
      '</div>';
    }

    var stage = s.stage;
    var belt = ({
      beginner: 'belt-white', daily: 'belt-yellow', week: 'belt-green',
      fortnight: 'belt-blue', month: 'belt-purple', season: 'belt-brown', legend: 'belt-black'
    })[stage.key] || 'belt-white';
    var beltSrc = this._assetUrl('assets/ui/' + belt + '.png');

    var hist = this._streakHistory14(s);
    var dots = hist.map(function(active, i) {
      var op = active ? (0.55 + (i / hist.length) * 0.45) : 1;
      var bg = active ? 'var(--vermilion)' : 'oklch(1 0 0 / 0.14)';
      return '<div style="width:8px;height:8px;border-radius:2px;background:' + bg + ';opacity:' + op.toFixed(2) + ';"></div>';
    }).join('');

    var freezeHtml = s.freezes > 0
      ? '<div style="margin-top:4px;color:oklch(0.8 0.08 220);">❄ ' + s.freezes + ' freeze' + (s.freezes > 1 ? 's' : '') + '</div>'
      : '';

    return '<div data-tour="streak" style="margin:0 16px;padding:16px 18px;border-radius:var(--r-lg);background:var(--ink);color:var(--washi);display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;">' +
      '<div style="position:absolute;right:-20px;top:-30px;font-family:var(--font-jp-display);font-size:180px;font-weight:700;color:rgba(255,255,255,0.04);pointer-events:none;line-height:1;">続</div>' +
      '<img src="' + beltSrc + '" alt="' + this._esc(stage.en) + ' belt" style="width:62px;height:auto;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.25));position:relative;z-index:1;">' +
      '<div style="flex:1;min-width:0;position:relative;z-index:1;">' +
        '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px;">' +
          '<div style="font-size:32px;font-weight:700;letter-spacing:-0.02em;line-height:1;">' + s.current + '</div>' +
          '<div class="mono" style="font-size:10px;opacity:0.7;text-transform:uppercase;letter-spacing:0.12em;">day streak</div>' +
        '</div>' +
        '<div style="font-family:var(--font-jp-display);font-size:13px;opacity:0.8;margin-bottom:8px;">' + this._esc(stage.jp) + ' · <span style="font-family:var(--font-ui);font-weight:500;">' + this._esc(stage.en) + '</span></div>' +
        '<div style="display:flex;gap:4px;">' + dots + '</div>' +
      '</div>' +
      '<div style="text-align:right;font-size:11px;color:oklch(1 0 0 / 0.5);line-height:1.5;position:relative;z-index:1;">' +
        '<div class="mono" style="letter-spacing:0.1em;text-transform:uppercase;">Best</div>' +
        '<div style="font-size:18px;font-weight:600;color:var(--washi);">' + s.best + '</div>' +
        freezeHtml +
      '</div>' +
    '</div>';
  },

  _sectionHeader: function(label, meta) {
    return '<div style="padding:22px 22px 10px;display:flex;align-items:baseline;gap:12px;">' +
      '<div class="jp-serif" style="font-size:13px;color:var(--ink-2);white-space:nowrap;">' + this._esc(label) + '</div>' +
      '<div style="flex:1;height:1px;background:var(--hairline);"></div>' +
      (meta ? '<div class="mono" style="font-size:10px;color:var(--ink-3);letter-spacing:0.08em;white-space:nowrap;">' + this._esc(meta) + '</div>' : '') +
    '</div>';
  },

  // --- Today card ---
  _todayCard: function(prog) {
    if (!prog) return '';
    var I = this._ICONS;
    var self = this;

    // No blocker — everything available is done. Reassuring empty state.
    if (!prog.today) {
      return '<div data-tour="lesson" style="margin:0 16px;padding:20px;border-radius:var(--r-xl);background:var(--washi);border:1px solid var(--hairline);text-align:center;">' +
        '<div style="font-family:var(--font-jp-display);font-size:22px;color:var(--ink);margin-bottom:6px;">よくできました</div>' +
        '<div style="font-size:13px;color:var(--ink-3);">All N5 lessons complete. Keep your streak alive in the Dojo.</div>' +
      '</div>';
    }

    var kind  = prog.today.kind;       // 'lesson' | 'grammar' | 'review' | 'retake'
    var entry = prog.today.entry;
    var blocking = prog.today.blocking; // present when kind === 'retake'

    function stat(val, label, mono) {
      return '<div><div style="font-size:18px;font-weight:600;line-height:1;' + (mono ? 'font-family:var(--font-mono);' : '') + '">' + val + '</div>' +
        '<div class="mono" style="font-size:9.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.12em;margin-top:2px;">' + label + '</div></div>';
    }
    var sep = '<div style="width:1px;background:var(--hairline);"></div>';

    // ---------- GRAMMAR card ----------
    if (kind === 'grammar') {
      var gn = (entry.id || '').replace(/^G/, '');
      var icon = entry.icon || '📐';
      var minsG = entry.estimatedMinutes || 15;
      return '<div data-tour="lesson" style="margin:0 16px;border-radius:var(--r-xl);background:var(--washi);border:1px solid var(--hairline);overflow:hidden;position:relative;box-shadow:0 10px 30px oklch(0.58 0.09 140 / 0.15);">' +
        '<div style="padding:12px 20px;border-bottom:1px solid var(--hairline);display:flex;align-items:center;justify-content:space-between;background:var(--ink);color:var(--washi);">' +
          '<div class="mono" style="font-size:10.5px;color:oklch(1 0 0 / 0.55);letter-spacing:0.14em;text-transform:uppercase;font-weight:500;">● Up next · Grammar ' + self._esc(entry.id) + '</div>' +
          '<div class="mono" style="font-size:11px;color:oklch(1 0 0 / 0.6);">~' + minsG + ' min</div>' +
        '</div>' +
        '<div style="padding:18px 20px 20px;display:flex;gap:16px;">' +
          '<div style="flex:1;min-width:0;">' +
            '<div class="jp-serif" style="font-size:13px;color:var(--ink-3);margin-bottom:4px;">N5 · ぶんぽう ' + self._esc(gn) + '</div>' +
            '<h2 style="margin:0;font-size:22px;font-weight:600;letter-spacing:-0.02em;line-height:1.2;color:var(--ink);">' + self._esc(entry.title) + '</h2>' +
            '<div style="display:flex;gap:14px;margin-top:12px;">' +
              stat(prog.lessonsDone + '/' + prog.lessonsTotal, 'lessons') + sep +
              stat(entry.id, 'grammar', true) +
            '</div>' +
            '<button onclick="JPApp.launch(\'grammar\',\'' + self._esc(entry.id) + '\')" class="rk-press" style="margin-top:16px;padding:11px 18px;border-radius:999px;border:none;background:var(--moss);color:var(--washi);font-size:14px;font-weight:600;letter-spacing:-0.01em;display:inline-flex;align-items:center;gap:10px;">Begin grammar ' + I.arrow + '</button>' +
          '</div>' +
          '<div style="width:96px;height:96px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--moss);color:var(--washi);border-radius:var(--r-md);font-size:48px;line-height:1;">' + icon + '</div>' +
        '</div>' +
      '</div>';
    }

    // ---------- REVIEW card ----------
    if (kind === 'review') {
      var rvMatch = (entry.id || '').match(/\.Review\.(\d+)/);
      var rvLabel = rvMatch ? ('ふくしゅう ' + rvMatch[1]) : 'ふくしゅう';
      var minsR = entry.estimatedMinutes || 10;
      return '<div data-tour="lesson" style="margin:0 16px;border-radius:var(--r-xl);background:var(--washi);border:1px solid var(--hairline);overflow:hidden;position:relative;box-shadow:0 10px 30px oklch(0.42 0.08 250 / 0.16);">' +
        '<div style="padding:12px 20px;border-bottom:1px solid var(--hairline);display:flex;align-items:center;justify-content:space-between;background:var(--ink);color:var(--washi);">' +
          '<div class="mono" style="font-size:10.5px;color:oklch(1 0 0 / 0.55);letter-spacing:0.14em;text-transform:uppercase;font-weight:500;">● Up next · Review ' + self._esc(entry.id) + '</div>' +
          '<div class="mono" style="font-size:11px;color:oklch(1 0 0 / 0.6);">~' + minsR + ' min</div>' +
        '</div>' +
        '<div style="padding:18px 20px 20px;display:flex;gap:16px;">' +
          '<div style="flex:1;min-width:0;">' +
            '<div class="jp-serif" style="font-size:13px;color:var(--ink-3);margin-bottom:4px;">N5 · ' + rvLabel + '</div>' +
            '<h2 style="margin:0;font-size:22px;font-weight:600;letter-spacing:-0.02em;line-height:1.2;color:var(--ink);">' + self._esc(entry.title) + '</h2>' +
            '<div style="font-size:13px;color:var(--ink-2);margin-top:6px;line-height:1.45;">Pass with 60% or higher to continue your path.</div>' +
            '<button onclick="JPApp.launch(\'review\',\'' + self._esc(entry.id) + '\')" class="rk-press" style="margin-top:14px;padding:11px 18px;border-radius:999px;border:none;background:var(--indigo);color:var(--washi);font-size:14px;font-weight:600;letter-spacing:-0.01em;display:inline-flex;align-items:center;gap:10px;">Begin review ' + I.arrow + '</button>' +
          '</div>' +
          '<div style="width:96px;height:96px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--indigo);color:var(--washi);border-radius:var(--r-md);font-family:var(--font-jp-display);font-size:54px;font-weight:500;line-height:1;">習</div>' +
        '</div>' +
      '</div>';
    }

    // ---------- RETAKE card (e.g. need to re-pass N5.1 to unlock N5.2) ----------
    if (kind === 'retake') {
      var rn = parseInt((entry.id || '').split('.')[1], 10) || 0;
      var blockTitle = blocking && blocking.id ? ('Lesson ' + (blocking.id.split('.')[1] || '')) : 'the next lesson';
      return '<div data-tour="lesson" style="margin:0 16px;border-radius:var(--r-xl);background:var(--washi);border:1px solid var(--hairline);overflow:hidden;position:relative;box-shadow:0 10px 30px oklch(0.6 0.18 30 / 0.12);">' +
        '<div style="padding:12px 20px;border-bottom:1px solid var(--hairline);display:flex;align-items:center;justify-content:space-between;background:var(--ink);color:var(--washi);">' +
          '<div class="mono" style="font-size:10.5px;color:oklch(1 0 0 / 0.55);letter-spacing:0.14em;text-transform:uppercase;font-weight:500;">● Retake · ' + self._esc(entry.id) + '</div>' +
          '<div class="mono" style="font-size:11px;color:oklch(1 0 0 / 0.6);">Score 60%+ to unlock</div>' +
        '</div>' +
        '<div style="padding:18px 20px 20px;display:flex;gap:16px;">' +
          '<div style="flex:1;min-width:0;">' +
            '<div class="jp-serif" style="font-size:13px;color:var(--ink-3);margin-bottom:4px;">N5 · 第' + rn + '課 · Retake</div>' +
            '<h2 style="margin:0;font-size:22px;font-weight:600;letter-spacing:-0.02em;line-height:1.2;color:var(--ink);">' + self._esc(entry.title) + '</h2>' +
            '<div style="font-size:13px;color:var(--ink-2);margin-top:6px;line-height:1.45;">Pass with 60% or higher to unlock <strong>' + self._esc(blockTitle) + '</strong>.</div>' +
            '<button onclick="JPApp.launch(\'lesson\',\'' + self._esc(entry.id) + '\')" class="rk-press" style="margin-top:14px;padding:11px 18px;border-radius:999px;border:none;background:var(--vermilion);color:var(--washi);font-size:14px;font-weight:600;letter-spacing:-0.01em;display:inline-flex;align-items:center;gap:10px;">Retake lesson ' + I.arrow + '</button>' +
          '</div>' +
          '<div style="width:96px;height:96px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--vermilion);color:var(--washi);border-radius:var(--r-md);font-family:var(--font-jp-display);font-size:54px;font-weight:500;line-height:1;">復</div>' +
        '</div>' +
      '</div>';
    }

    // ---------- LESSON card (default) ----------
    var l = entry;
    var n = parseInt((l.id || '').split('.')[1], 10) || 0;
    var kanji = l.kanji || [];
    var accent = kanji[0] || '本';
    var minutes = Math.max(5, Math.round(kanji.length * 1.2 + 4));
    var tiles = kanji.map(function(k) {
      return '<div style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--washi-2);color:var(--ink);font-family:var(--font-jp-display);font-size:17px;font-weight:500;border:1px solid var(--hairline);">' + k + '</div>';
    }).join('');

    return '<div data-tour="lesson" style="margin:0 16px;border-radius:var(--r-xl);background:var(--washi);border:1px solid var(--hairline);overflow:hidden;position:relative;box-shadow:0 10px 30px oklch(0.6 0.18 30 / 0.12);">' +
      '<div style="padding:12px 20px;border-bottom:1px solid var(--hairline);display:flex;align-items:center;justify-content:space-between;background:var(--ink);color:var(--washi);">' +
        '<div class="mono" style="font-size:10.5px;color:oklch(1 0 0 / 0.55);letter-spacing:0.14em;text-transform:uppercase;font-weight:500;">● Today’s lesson · ' + self._esc(l.id) + '</div>' +
        '<div class="mono" style="font-size:11px;color:oklch(1 0 0 / 0.6);">~' + minutes + ' min</div>' +
      '</div>' +
      '<div style="padding:18px 20px 20px;display:flex;gap:16px;">' +
        '<div style="flex:1;min-width:0;">' +
          '<div class="jp-serif" style="font-size:13px;color:var(--ink-3);margin-bottom:4px;">N5 · 第' + n + '課</div>' +
          '<h2 style="margin:0;font-size:24px;font-weight:600;letter-spacing:-0.02em;line-height:1.15;color:var(--ink);">' + self._esc(l.title) + '</h2>' +
          '<div style="display:flex;gap:14px;margin-top:12px;">' +
            stat(kanji.length, 'new kanji') + sep +
            stat(prog.lessonsDone + '/' + prog.lessonsTotal, 'lessons') + sep +
            stat(l.id, 'chapter', true) +
          '</div>' +
          '<button onclick="JPApp.launch(\'lesson\',\'' + self._esc(l.id) + '\')" class="rk-press" style="margin-top:16px;padding:11px 18px;border-radius:999px;border:none;background:var(--vermilion);color:var(--washi);font-size:14px;font-weight:600;letter-spacing:-0.01em;display:inline-flex;align-items:center;gap:10px;">Begin lesson ' + I.arrow + '</button>' +
        '</div>' +
        '<div style="width:96px;height:96px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--vermilion);color:var(--washi);border-radius:var(--r-md);font-family:var(--font-jp-display);font-size:68px;font-weight:500;line-height:1;">' + accent + '</div>' +
      '</div>' +
      (kanji.length ? '<div style="padding:14px 20px 18px;border-top:1px dashed var(--hairline);">' +
        '<div class="mono" style="font-size:10.5px;color:var(--ink-3);letter-spacing:0.14em;text-transform:uppercase;">In this lesson</div>' +
        '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">' + tiles + '</div>' +
      '</div>' : '') +
    '</div>';
  },

  // --- Resume card (only when a real compose draft exists) ---
  _resumeCard: function() {
    var draft = this._findDraft();
    if (!draft) return '';
    var I = this._ICONS;
    var preview = draft.text.replace(/\s+/g, ' ').trim().slice(0, 28);
    return '<div onclick="JPApp.launch(\'compose\')" class="rk-press" style="margin:12px 16px 0;padding:14px 18px;border-radius:var(--r-lg);border:1px solid var(--hairline);display:flex;align-items:center;gap:14px;background:transparent;">' +
      '<div style="width:40px;height:40px;flex-shrink:0;border-radius:10px;background:var(--moss);color:var(--washi);font-family:var(--font-jp-display);font-size:24px;font-weight:500;display:flex;align-items:center;justify-content:center;">作</div>' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:2px;"><div style="font-size:14px;font-weight:600;">Continue writing</div><div style="font-size:12px;color:var(--ink-3);">· Compose</div></div>' +
        '<div class="jp-sans" style="font-size:12px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">“' + this._esc(preview) + '”</div>' +
      '</div>' +
      '<div class="mono" style="font-size:10px;color:var(--ink-3);letter-spacing:0.08em;text-transform:uppercase;">Draft</div>' +
      I.chev +
    '</div>';
  },

  // --- Module grid ---
  _moduleGrid: function() {
    var self = this;
    var mods = [
      { key: 'lesson',   label: 'Lessons',   jp: 'レッスン',   kanji: '本', accent: 'ink' },
      { key: 'grammar',  label: 'Grammar',   jp: 'ぶんぽう',   kanji: '文', accent: 'moss' },
      { key: 'practice', label: 'Dojo',      jp: 'どうじょう', kanji: '道', accent: 'vermilion' },
      { key: 'compose',  label: 'Compose',   jp: 'さくぶん',   kanji: '作', accent: 'indigo' },
      { key: 'story',    label: 'Stories',   jp: 'ものがたり', kanji: '語', accent: 'gold' },
      { key: 'review',   label: 'Review',    jp: 'ふくしゅう', kanji: '習', accent: 'ink' },
      { key: 'game',     label: 'Adventure', jp: 'ぼうけん',   kanji: '険', accent: 'vermilion' }
    ];
    // Custom module is an opt-in demo tile — surfaced only after the user enables
    // it in Settings → Upgrades → Custom Content (k-custom-enabled).
    var customOn = false;
    try { customOn = localStorage.getItem('k-custom-enabled') === '1'; } catch (e) {}
    if (customOn) {
      mods.push({ key: 'custom', label: 'Custom', jp: 'カスタム', kanji: '創', accent: 'gold' });
    }
    var cells = mods.map(function(m) {
      var color = self._accent(m.accent);
      var visible = self._isModuleVisible(m.key);
      if (visible) {
        return '<button data-mod="' + m.key + '" onclick="JPApp.launch(\'' + m.key + '\')" class="rk-press" style="text-align:left;padding:14px 14px 12px;background:var(--washi);border:1px solid var(--hairline);border-top:3px solid ' + color + ';border-radius:var(--r-md);position:relative;overflow:hidden;min-height:92px;display:flex;flex-direction:column;justify-content:space-between;">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;">' +
            '<div><div style="font-size:14px;font-weight:600;color:var(--ink);margin-bottom:2px;">' + m.label + '</div>' +
            '<div class="jp-serif" style="font-size:11px;color:var(--ink-3);">' + m.jp + '</div></div>' +
            '<div style="font-family:var(--font-jp-display);font-size:22px;font-weight:500;color:' + color + ';line-height:1;">' + m.kanji + '</div>' +
          '</div>' +
          '<div class="mono" style="font-size:10px;color:var(--ink-3);letter-spacing:0.08em;text-transform:uppercase;">Open</div>' +
        '</button>';
      }
      // Locked cell — muted, teaches progression.
      return '<div style="text-align:left;padding:14px 14px 12px;background:var(--washi-2);border:1px solid var(--hairline);border-radius:var(--r-md);min-height:92px;display:flex;flex-direction:column;justify-content:space-between;opacity:0.55;">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;">' +
          '<div><div style="font-size:14px;font-weight:600;color:var(--ink-2);margin-bottom:2px;">' + m.label + '</div>' +
          '<div class="jp-serif" style="font-size:11px;color:var(--ink-3);">' + m.jp + '</div></div>' +
          '<div style="font-family:var(--font-jp-display);font-size:22px;font-weight:500;color:var(--ink-3);line-height:1;">' + m.kanji + '</div>' +
        '</div>' +
        '<div class="mono" style="font-size:10px;color:var(--ink-3);letter-spacing:0.08em;text-transform:uppercase;">🔒 Locked</div>' +
      '</div>';
    }).join('');

    return '<div data-tour="modules" style="margin:0 16px;">' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' + cells + '</div>' +
    '</div>';
  },

  // --- Level progress strip ---
  _levelStrip: function(prog) {
    if (!prog) return '';
    var pct = prog.lessonsTotal ? Math.round((prog.lessonsDone / prog.lessonsTotal) * 100) : 0;
    function row(icon, label, value, total, color) {
      var p = total ? Math.max(0, Math.min(1, value / total)) : 0;
      return '<div>' +
        '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">' +
          '<div style="display:flex;align-items:baseline;gap:5px;"><span class="jp-serif" style="font-size:12px;color:var(--ink-3);">' + icon + '</span>' +
          '<span style="font-size:11px;color:var(--ink-2);">' + label + '</span></div>' +
          '<div style="font-size:12px;font-weight:600;">' + value + '<span style="color:var(--ink-3);font-weight:400;">/' + total + '</span></div>' +
        '</div>' +
        '<div style="position:relative;height:4px;border-radius:999px;background:var(--hairline-2);overflow:hidden;"><div style="position:absolute;left:0;top:0;bottom:0;width:' + (p * 100) + '%;background:' + color + ';border-radius:999px;"></div></div>' +
      '</div>';
    }
    return '<div style="margin:0 16px;padding:14px 18px;border:1px solid var(--hairline);border-radius:var(--r-lg);">' +
      '<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;">' +
        '<div style="display:flex;align-items:baseline;gap:8px;"><div style="font-size:18px;font-weight:700;letter-spacing:-0.02em;">N5</div><div style="font-size:12px;color:var(--ink-3);">Foundations</div></div>' +
        '<div class="mono" style="font-size:10px;color:var(--ink-3);letter-spacing:0.1em;text-transform:uppercase;">' + pct + '% complete</div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">' +
        row('本', 'Lessons', prog.lessonsDone, prog.lessonsTotal, 'var(--ink)') +
        row('字', 'Kanji', prog.kanjiDone, prog.kanjiTotal, 'var(--vermilion)') +
      '</div>' +
    '</div>';

  // --- Bottom tab bar ---
  _tabBar: function() {

      { key: 'home',   label: 'Home',     glyph: I.tabHome,  action: "JPApp.renderMenu()" },

        '</div>' +

  // --- RIKIZO GREETING DISPATCHER ---
  // Priority order, once per app-open:
  //   1. rank-up celebration (existing)
  //   2. pending lesson/dojo celebration (newly written by Lesson.js on finish)
  //   3. first-launch onboarding
  //   4. time-based greeting
  // Re-renders of the home screen (e.g. returning from a module) re-apply
  // presence but do not re-trigger a greeting in the same session.
  _rikizoGreet: function() {
    var rc = window.JPShared && window.JPShared.rikizoCompanion;
    var streak = window.JPShared && window.JPShared.streak;

    if (rc) rc.applyPresence();

    // 1) Rank-up wins.
    if (window._jp_activity_this_session && streak) {
      var rankUp = streak.consumeRankUp();
      if (rankUp) { this._showRankUpPopup(rankUp, streak.getState()); return; }
    }

    // 2) Pending lesson/dojo celebration. Checked BEFORE the session-greeted
    //    guard so a celebration can fire when the user returns home after a
    //    lesson — even if the time-greeting already played at app open.
    //    The key itself is one-shot (consumed on read), so it can never fire
    //    twice in a row by itself.
    var pending = null;
    try {
      var raw = localStorage.getItem('k-rikizo-pending-celebration');
      if (raw) {
        pending = JSON.parse(raw);
        localStorage.removeItem('k-rikizo-pending-celebration');
      }
    } catch (e) { pending = null; }
    if (pending && rc && rc.runLessonCompleteCelebration) {
      rc.runLessonCompleteCelebration(pending);
      return;
    }

    // 3) Otherwise — onboarding or time greeting, once per app-open.
    if (window._rikizo_greeted_this_session) return;
    window._rikizo_greeted_this_session = true;

    if (rc) {
      if (!rc.isOnboarded()) { rc.runOnboarding(); return; }
      rc.greetByTime();
      return;
    }
    this._showReturnMessage();
  },

  // --- RETURN MESSAGE (legacy Rikizo greeting; now a fallback only) ---
  _showReturnMessage: function() {
    var streak = window.JPShared && window.JPShared.streak;
    if (!streak) return;
    var s = streak.getState();

    if (window._jp_activity_this_session) {
      var rankUp = streak.consumeRankUp();
      if (rankUp) { this._showRankUpPopup(rankUp, s); return; }
    }

    if (s.daysAway === 0) return;
    if (s.daysAway === -1) return;

    if (!window.JPShared._rikizo_messages) {
      var self = this;
      var url = this._assetUrl('data/shared/rikizo-messages.json') + '?t=' + Date.now();
      fetch(url).then(function(r) { return r.json(); }).then(function(data) {
        window.JPShared._rikizo_messages = data;
        self._showReturnMessage();
      }).catch(function() {});
      return;
    }

    var msg = streak.getReturnMessage(s.daysAway);
    if (!msg) return;
    if (window._rikizo_return_shown) return;
    window._rikizo_return_shown = true;

    var belt = ({
      beginner: 'belt-white', daily: 'belt-yellow', week: 'belt-green',
      fortnight: 'belt-blue', month: 'belt-purple', season: 'belt-brown', legend: 'belt-black'
    })[s.stage.key] || 'belt-white';
    var beltHtml = s.current > 0
      ? '<img class="jp-return-belt" src="' + this._assetUrl('assets/ui/' + belt + '.png') + '" alt="' + this._esc(s.stage.en) + ' belt">'
      : '';

    var overlay = document.createElement('div');
    overlay.className = 'jp-return-overlay';
    overlay.innerHTML =
      '<div class="jp-return-card">' +
        '<div class="jp-return-jp">' + this._esc(msg.jp || '') + '</div>' +
        '<div class="jp-return-text">' + this._esc(msg.text) + '</div>' +
        beltHtml +
        (s.current > 0 ? '<div class="mono" style="font-size:0.82rem;color:var(--ink-3);margin-bottom:14px;">🔥 ' + s.current + ' day streak</div>' : '') +
        '<button onclick="this.closest(\'.jp-return-overlay\').remove()" style="background:var(--vermilion);color:var(--washi);border:none;padding:10px 28px;border-radius:999px;font-size:1rem;font-weight:600;cursor:pointer;">Let’s Go!</button>' +
      '</div>';
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
    setTimeout(function() { if (overlay.parentNode) overlay.remove(); }, 5000);
  },

  // --- RANK-UP CELEBRATION POPUP ---
  _showRankUpPopup: function(stage, streakState) {
    var belt = ({
      beginner: 'belt-white', daily: 'belt-yellow', week: 'belt-green',
      fortnight: 'belt-blue', month: 'belt-purple', season: 'belt-brown', legend: 'belt-black'
    })[stage.key] || 'belt-white';
    var beltSrc = this._assetUrl('assets/ui/' + belt + '.png');
    var rikizoSrc = this._assetUrl('assets/characters/rikizo/rikizo_head.png');

    var overlay = document.createElement('div');
    overlay.className = 'jp-return-overlay';
    overlay.innerHTML =
      '<div class="jp-rankup-card">' +
        '<div class="jp-rankup-particles" id="jp-rankup-particles"></div>' +
        '<img class="jp-rankup-rikizo" src="' + rikizoSrc + '" alt="Rikizo">' +
        '<div class="jp-rankup-title">Rank Up!</div>' +
        '<div class="jp-rankup-stage" style="color:' + stage.color + ';">' + this._esc(stage.en) + '</div>' +
        '<div class="jp-rankup-stage-jp">' + this._esc(stage.jp) + '</div>' +
        '<img class="jp-rankup-belt" src="' + beltSrc + '" alt="' + this._esc(stage.en) + ' belt">' +
        '<div class="jp-rankup-streak">🔥 ' + streakState.current + ' day streak</div>' +
        '<button onclick="this.closest(\'.jp-return-overlay\').remove()" style="background:' + stage.color + ';color:#fff;border:none;padding:12px 32px;border-radius:999px;font-size:1rem;font-weight:700;cursor:pointer;position:relative;z-index:1;">Let’s Go!</button>' +
      '</div>';
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);

    var container = document.getElementById('jp-rankup-particles');
    if (container) {
      var colors = [stage.color, '#FFD700', '#FF6B6B', '#4ECDC4', '#A78BFA'];
      var burstPoints = [{ x: 0.2, y: 0.2 }, { x: 0.8, y: 0.2 }, { x: 0.5, y: 0.15 }, { x: 0.3, y: 0.8 }, { x: 0.7, y: 0.8 }];
      burstPoints.forEach(function(bp, bIdx) {
        for (var i = 0; i < 8; i++) {
          var p = document.createElement('div');
          p.className = 'jp-rankup-particle';
          var angle = (Math.PI * 2 * i / 8) + (Math.random() * 0.3);
          var dist = 40 + Math.random() * 80;
          var color = colors[Math.floor(Math.random() * colors.length)];
          var size = 4 + Math.random() * 6;
          var delay = bIdx * 120 + Math.random() * 150;
          var dx = Math.cos(angle) * dist, dy = Math.sin(angle) * dist;
          p.style.cssText = 'left:' + (bp.x * 100) + '%;top:' + (bp.y * 100) + '%;width:' + size + 'px;height:' + size + 'px;background:' + color + ';box-shadow:0 0 ' + (size + 2) + 'px ' + color + ';transition:transform 1s cubic-bezier(0.25,0.46,0.45,0.94),opacity 1s ease-out;transition-delay:' + delay + 'ms;';
          container.appendChild(p);
          (function(particle, tdx, tdy) {
            requestAnimationFrame(function() { requestAnimationFrame(function() {
              particle.style.opacity = '1';
              particle.style.transform = 'translate(' + tdx + 'px,' + tdy + 'px)';
              setTimeout(function() { particle.style.opacity = '0'; }, delay + 400);
            }); });
          })(p, dx, dy);
        }
      });
    }
    setTimeout(function() { if (overlay.parentNode) overlay.remove(); }, 8000);
  },

          '<div class="jp-serif" style="font-size:36px;font-weight:600;line-height:1.1;">ぼうけん</div>' +
          '<div style="font-size:18px;font-weight:600;color:oklch(1 0 0 / 0.85);margin-top:4px;">Adventure</div>' +
          '<div style="font-size:13px;color:oklch(1 0 0 / 0.6);margin-top:14px;line-height:1.5;max-width:280px;">A pixel-art RPG to practice Japanese in the wild. Coming to <strong style="color:var(--washi);">iOS &amp; Android</strong>.</div>' +
          '<div style="margin-top:28px;width:100%;max-width:280px;">' +
            '<div class="mono" style="display:flex;justify-content:space-between;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:oklch(1 0 0 / 0.55);margin-bottom:6px;"><span>N5 Game Days</span><span>17 remaining</span></div>' +
            '<div style="height:4px;border-radius:999px;background:oklch(1 0 0 / 0.15);overflow:hidden;"><div style="height:100%;width:6%;background:var(--vermilion);border-radius:999px;"></div></div>' +
          '</div>' +
        '</div>' +
      '</div>';
  },

  // Reason for why a module is currently locked — used by the lock toast.
  _lockReason: function(mode) {
    var completed = JSON.parse(localStorage.getItem('k-lesson-completed') || '{}');
    var scores    = JSON.parse(localStorage.getItem('k-lesson-scores')    || '{}');
    var done = function(id) { return !!completed[id]; };
    if (mode === 'grammar' || mode === 'practice') return 'Complete Lesson 1 to unlock.';
    if (mode === 'compose' || mode === 'game') {
      if (!done('N5.1')) return 'Complete Lesson 1 to unlock.';
      return 'Score 60% on Lesson 1 to unlock.';
    }
    if (mode === 'story' || mode === 'review') {
      if (!done('N5.2')) return 'Reach Lesson 2 first.';
      return 'Score 60% on Lesson 2 to unlock.';
    }
    if (mode === 'audiodojo') return 'Score 60% on Lesson 3 to unlock Audio Dojo.';
    return 'Locked.';
  },

  // Brief non-blocking toast at the top of the screen.
  _toast: function(msg) {
    var t = document.createElement('div');
    t.style.cssText = 'position:fixed;left:50%;top:max(60px,env(safe-area-inset-top));transform:translateX(-50%);' +
      'background:var(--ink);color:var(--washi);padding:10px 18px;border-radius:999px;font-size:13px;' +
      'font-weight:600;z-index:9999;box-shadow:0 6px 22px rgba(0,0,0,0.32);max-width:340px;text-align:center;' +
      'transition:opacity 0.3s ease;opacity:0;';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function () { t.style.opacity = '1'; });
    setTimeout(function () {
      t.style.opacity = '0';
      setTimeout(function () { if (t.parentNode) t.remove(); }, 320);
    }, 2400);
  },

  // --- LAUNCHER ---
  // Optional extra args (e.g. a lesson id) are forwarded to the module's start().
  launch: async function(mode /*, ...args */) {
    var extraArgs = Array.prototype.slice.call(arguments, 1);
    // Tutorial guard — while a tour/onboarding is running, ignore stray taps on
    // highlighted modules (the tour is tap-to-advance only). Prevents accidentally
    // launching e.g. Compose mid-tour, which used to break the walkthrough.
    var rc = window.JPShared && window.JPShared.rikizoCompanion;
    if (rc && rc.isBusy && rc.isBusy()) return;
    // Gating guard — refuse locked modules with a brief toast. The home grid
    // already hides locked cells; this catches taps from the bottom tab bar.
    if (mode !== 'home' && !this._isModuleVisible(mode)) {
      this._toast(this._lockReason(mode));
      return;
    }
    this._view = mode;
    if (mode === 'game') { this.hideTabBar(); this._showAdventureTeaser(); return; }
    this.container.innerHTML = '<div class="rk-loading">loading ' + this._esc(mode) + '</div>';
    // Leaving Home — re-apply presence (contextual/home modes hide; always stays).
    if (window.JPShared && window.JPShared.rikizoCompanion) window.JPShared.rikizoCompanion.applyPresence();
    // Tutor: record what the student is looking at (extraArgs[0] is the lesson/
    // grammar/story id for content modules) and keep the ask-button visible.
    if (window.JPShared && window.JPShared.tutorContext) {
      window.JPShared.tutorContext.set({ view: mode, lessonId: extraArgs[0] || null });
    }
    if (window.JPShared && window.JPShared.tutorOverlay) window.JPShared.tutorOverlay.applyVisibility();

    if (!window.JPShared || !window.JPShared.textProcessor) {
      var sharedModules = [
        'app/shared/tts-normalize.js',
        'app/shared/tts.js',
        'app/shared/stamp-settings.js',
        'app/shared/user-profile.js',
        'app/shared/tts-settings.js',
        'app/shared/progress.js',
        'app/shared/unlock.js',
        'app/shared/vocab-display.js',
        'app/shared/text-processor.js',
        'app/shared/term-modal.js',
        'app/shared/characters.js',
        'app/shared/haptics.js'
      ];
      for (var i = 0; i < sharedModules.length; i++) {
        var ok = await this.loadModule(sharedModules[i]);
        if (!ok) return;
      }
      if (window.JPShared.stampSettings) window.JPShared.stampSettings.setConfig(this.config);
      if (window.JPShared.tts) window.JPShared.tts.setConfig(this.config);
    }

    var onExit = (function(self) { return function() { self.renderMenu(); }; })(this);

    var map = {
      lesson:         { global: 'LessonModule',              file: 'Lesson.js' },
      practice:       { global: 'PracticeModule',            file: 'Practice.js' },
      review:         { global: 'ReviewModule',              file: 'Review.js' },
      compose:        { global: 'ComposeModule',             file: 'Compose.js' },
      story:          { global: 'StoryModule',               file: 'Stories.js' },
      audiodojo:      { global: 'AudioDojoModule',           file: 'AudioDojo.js' },
      grammar:        { global: 'GrammarModule',             file: 'Grammar.js' },
      game:           { global: 'GameModule',                file: 'Game.js' },
      custom:         { global: 'CustomStoriesModule',       file: 'Stories.js' },
      'teacher-bingo':{ global: 'KanjiBingoGeneratorModule', file: 'KanjiBingoGenerator.js' },
      'writing-kanji':{ global: 'WritingKanjiModule',        file: 'WritingKanji.js',
                        deps: ['app/shared/stroke-canvas.js', 'app/shared/ink-morph.js'] },
      'writing-kana': { global: 'WritingKanaModule',         file: 'WritingKana.js',
                        deps: ['app/shared/stroke-canvas.js'] },
      map:            { global: 'MapModule',                 file: 'Map.js' }
    };
    var entry = map[mode];
    if (entry && entry.deps) {
      for (var di = 0; di < entry.deps.length; di++) {
        var dep = entry.deps[di];
        // Use the JPShared key as the load-once sentinel.
        var key = dep.indexOf('stroke-canvas') >= 0 ? 'strokeCanvas'
                : dep.indexOf('ink-morph') >= 0    ? 'inkMorph'
                : null;
        if (key && window.JPShared && window.JPShared[key]) continue;
        var okDep = await this.loadModule(dep);
        if (!okDep) return;
      }
    }
    if (!entry) return;
    if (!window[entry.global]) {
      var loaded = await this.loadModule(entry.file);
      if (!loaded) return;
    }
    if (window[entry.global]) {
      var startArgs = [this.container, this.config, onExit].concat(extraArgs);
      window[entry.global].start.apply(window[entry.global], startArgs);
    }
  }
};

window.JPShared = window.JPShared || {};
window.JPShared._rankUpHandler = function(stage) {
  var streak = window.JPShared && window.JPShared.streak;
  var s = streak ? streak.getState() : { current: 0 };
  streak && streak.consumeRankUp();
  window.JPApp._showRankUpPopup(stage, s);
};

document.addEventListener('DOMContentLoaded', function() { window.JPApp.init(); });
</script>
